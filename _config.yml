# =============================================================
# REPLACE the two lines below with your actual GitHub username
# =============================================================
url: "https://zoeefstathiou.github.io"
repository: "zoeefstathiou/zoeefstathiou.github.io"

# Site Settings
locale: "en-US"
title: "Zoe Efstathiou"
title_separator: "-"
subtitle: "Machine Learning Blog"
name: "Zoe Efstathiou"
description: "Documenting my machine learning notes and projects."
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default"

# Plugins (whitelisted by GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Author sidebar
author:
  name: "Zoe Efstathiou"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Mathematician, Pianist and Composer. Fascinated with foundation models, interpretability, multimodality and machine learning for sound."
  location: "Sweden/Norway"
  email: "zoiefstathiou@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/YOUR-GITHUB-USERNAME"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "#"
    #- label: "Google Scholar"
    #  icon: "fas fa-fw fa-graduation-cap"
    #  url: "#"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - Gemfile
  - Gemfile.lock
  - node_modules

# Paginate (5 posts per page on blog listing)
paginate: 5
paginate_path: /page:num/

# Build settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Archives
category_archive:
  type: liquid
  path: /categories/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
